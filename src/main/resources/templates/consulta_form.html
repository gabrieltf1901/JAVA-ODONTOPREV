<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Formulário Consulta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
<div class="container mt-4">
    <h1 th:text="${consulta.id} != null ? 'Editar Consulta' : 'Nova Consulta'"></h1>
    <form th:action="@{/consultas/salvar}" th:object="${consulta}" method="post">
        <input type="hidden" th:field="*{id}" />
        <div class="mb-3">
            <label class="form-label">Data/Hora Consulta:</label>
            <input type="datetime-local" th:field="*{dataHoraConsulta}" class="form-control" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Tipo de Procedimento:</label>
            <input type="text" th:field="*{tipoProcedimento}" class="form-control" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Valor da Consulta:</label>
            <input type="number" step="0.01" th:field="*{valorConsulta}" class="form-control" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Status:</label>
            <select th:field="*{status}" class="form-select">
                <option value="Agendada">Agendada</option>
                <option value="Concluída">Concluída</option>
                <option value="Cancelada">Cancelada</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Profissional ID:</label>
            <input type="number" th:field="*{profissionalOpId}" class="form-control" required />
        </div>
        <button type="submit" class="btn btn-success">Salvar</button>
        <a th:href="@{/consultas}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
