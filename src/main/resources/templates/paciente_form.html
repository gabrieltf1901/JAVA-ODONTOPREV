<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Formulário Paciente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
<div class="container mt-4">
    <h1 th:text="${paciente.id} != null ? 'Editar Paciente' : 'Novo Paciente'"></h1>
    <form th:action="@{/pacientes/salvar}" th:object="${paciente}" method="post">
        <input type="hidden" th:field="*{id}" />
        <div class="mb-3">
            <label class="form-label">Nome Completo:</label>
            <input type="text" th:field="*{nomeCompleto}" class="form-control" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Data de Nascimento:</label>
            <input type="date" th:field="*{dataNascimento}" class="form-control" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Contato:</label>
            <input type="text" th:field="*{contato}" class="form-control" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Plano de Saúde:</label>
            <input type="text" th:field="*{planoDeSaude}" class="form-control" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Histórico Médico:</label>
            <textarea th:field="*{historicoMedico}" class="form-control" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-success">Salvar</button>
        <a th:href="@{/pacientes}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
