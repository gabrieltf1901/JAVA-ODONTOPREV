<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lista de Consultas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">Lista de Consultas</h1>
    <a th:href="@{/consultas/novo}" class="btn btn-primary mb-3">Adicionar Nova Consulta</a>
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Data/Hora Consulta</th>
            <th>Tipo de Procedimento</th>
            <th>Valor Consulta</th>
            <th>Status</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="consulta : ${consultas}">
            <td th:text="${consulta.id}">1</td>
            <td th:text="${#dates.format(consulta.dataHoraConsulta, 'dd/MM/yyyy HH:mm')}">Data/Hora</td>
            <td th:text="${consulta.tipoProcedimento}">Tipo</td>
            <td th:text="${consulta.valorConsulta}">Valor</td>
            <td th:text="${consulta.status}">Status</td>
            <td>
                <a th:href="@{'/consultas/editar/' + ${consulta.id}}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{'/consultas/deletar/' + ${consulta.id}}" class="btn btn-danger btn-sm">Deletar</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
