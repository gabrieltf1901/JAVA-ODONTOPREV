<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lista de Pacientes</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">Lista de Pacientes</h1>
    <a th:href="@{/pacientes/novo}" class="btn btn-primary mb-3">Adicionar Novo Paciente</a>
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nome Completo</th>
            <th>Data de Nascimento</th>
            <th>Contato</th>
            <th>Plano de Saúde</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="paciente : ${pacientes}">
            <td th:text="${paciente.id}">1</td>
            <td th:text="${paciente.nomeCompleto}">Nome</td>
            <td th:text="${#dates.format(paciente.dataNascimento, 'dd/MM/yyyy')}">Data</td>
            <td th:text="${paciente.contato}">Contato</td>
            <td th:text="${paciente.planoDeSaude}">Plano</td>
            <td>
                <a th:href="@{'/pacientes/editar/' + ${paciente.id}}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{'/pacientes/deletar/' + ${paciente.id}}" class="btn btn-danger btn-sm">Deletar</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<!-- Bootstrap JS Bundle CDN -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
